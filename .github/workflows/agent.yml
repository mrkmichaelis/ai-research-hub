name: AI Research Agent

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours: midnight, 6am, noon, 6pm UTC
  workflow_dispatch:          # Also allows manual one-click runs from GitHub UI

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r meta-agent/requirements.txt

      - name: Run research agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python meta-agent/run_once.py
